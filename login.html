<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册并登录 - 平遥古城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SimSun', '宋体', serif;
        }
        
        body {
            background-color: #f8f5f0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .login-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 400px;
            max-width: 90%;
        }
        
        .login-title {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .login-title h2 {
            color: #8c1515;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #8c1515;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .remember-forgot label {
            display: flex;
            align-items: center;
            font-size: 14px;
        }
        
        .remember-forgot a {
            color: #8c1515;
            text-decoration: none;
            font-size: 14px;
        }
        
        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #8c1515;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .login-button:hover {
            background-color: #6c0f0f;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .register-link a {
            color: #8c1515;
            text-decoration: none;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            display: none;
            background-color: #dff0d8;
            color: #3c763d;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="success-message" id="successMessage">
            注册成功！正在登录并跳转到主页...
        </div>
        
        <div class="login-title">
            <h2>用户注册并登录</h2>
            <p>欢迎登录平遥古城智能文旅平台</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名或邮箱</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="remember-forgot">
                <label>
                    <input type="checkbox" id="remember" name="remember">
                    记住我
                </label>
              
            </div>
            
            <button type="submit" class="login-button">登录</button>
        </form>
        
    
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // 获取表单数据
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 模拟登录验证（这里应该连接到后端进行实际验证）
            if (username && password) {
                // 显示成功消息
                const successMessage = document.getElementById('successMessage');
                successMessage.style.display = 'block';
                
                // 模拟页面跳转（这里应该根据实际需求进行跳转）
                setTimeout(function() {
                    // 跳转到之前的页面或主页
                    window.history.back();
                    
                    // 如果没有之前的页面，则跳转到主页
                    if (document.referrer === '') {
                        window.location.href = '首页.html'; // 替换为您的主页URL
                    }
                }, 1500); // 2秒后跳转
            } else {
                alert('请输入用户名和密码');
            }
        });
    </script>
</body>
</html>
